<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Simple HTML Page</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1f2933;
        background: #f6f8fa;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(92vw, 640px);
        padding: 48px 32px;
        background: #ffffff;
        border: 1px solid #d8dee4;
        border-radius: 8px;
        box-shadow: 0 16px 40px rgba(31, 41, 51, 0.08);
        text-align: center;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 6vw, 3.5rem);
        line-height: 1.1;
      }

      p {
        margin: 0 auto;
        max-width: 44rem;
        color: #52606d;
        font-size: 1.1rem;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>こんにちは</h1>
      <p>これはシンプルなHTMLページです。必要に応じて、この内容を自由に編集できます。</p>
    </main>
  </body>
</html>
